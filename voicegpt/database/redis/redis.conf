# Redis configuration for VoiceGPT
# Place in /usr/local/etc/redis/ or pass as --include to redis-server

# Network
bind 0.0.0.0
protected-mode no
port 6379

# Memory management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (snapshot for dev, AOF for production)
save 900 1
save 300 10
save 60 10000

# AOF (append-only file) — uncomment for production durability
# appendonly yes
# appendfsync everysec

# Logging
loglevel notice

# Connection limits
maxclients 100
timeout 300
tcp-keepalive 300
